name: Deploy to AWS Bakehouse Stack

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: eu-west-2               # set this to your preferred AWS region, e.g. us-west-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BAKEHOUSE_STACK_NAME: candace-smith
  CDK_DEFAULT_ACCOUNT: 827602716979
  CDK_DEFAULT_REGION: eu-west-2

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials via OIDC
      # ENHANCED: Session name includes student identifier and retry attempt
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          # Session name now includes:
          # gha-cdk-{student}-{run_id}-{attempt}
          # Example: gha-cdk-alice-1234567890-1
        role-session-name: ${{github.run_id}}
        aws-region: ${{ env.AWS_REGION }}
      
    - name: Verify OIDC credentials
      run: |
        echo "Verifying AWS credentials..."
        IDENTITY=$(aws sts get-caller-identity)
        echo "Assumed role:"
        echo "${IDENTITY}" | jq '.'

        # Extract role session name from assumed identity
        ROLE_SESSION=$(echo "${IDENTITY}" | jq -r '.Arn' | grep -oP '(?<=/)[^/]+$')
        echo "Current session: ${ROLE_SESSION}"
        
    - name: Extract student information
      id: student-info
      run: |
        # github.actor contains the GitHub username of who triggered the workflow
        STUDENT_NAME="${{ github.actor }}"
        echo "name=${STUDENT_NAME}" >> $GITHUB_OUTPUT
        echo "Student: ${STUDENT_NAME}"

    - name: Generate enhanced session name
      id: session-naming
      run: |
        # Enhanced session naming with:
        # - Student identifier (github.actor)
        # - Unique run ID (github.run_id)
        # - Retry attempt (github.run_attempt)
        
        STUDENT="${{ github.actor }}"
        RUN_ID="${{ github.run_id }}"
        ATTEMPT="${{ github.run_attempt }}"
        
        SESSION_NAME="gha-cdk-${STUDENT}-${RUN_ID}-${ATTEMPT}"
        echo "session-name=${SESSION_NAME}" >> $GITHUB_OUTPUT
        echo "Generated session name: ${SESSION_NAME}"
        echo "Length: ${#SESSION_NAME} characters (max 64)"
        
        # Validate length
        if [ ${#SESSION_NAME} -gt 64 ]; then
        echo "❌ Session name too long!"
        exit 1
        fi
    
    - name: Install Scripts
      working-directory: solution/bakehouse-app
      run: |
          chmod +x install.sh
          ./install.sh

    - name: Debugging step for aws credentials
      run: |
          aws sts get-caller-identity
          echo "CDK_DEFAULT_ACCOUNT = $CDK_DEFAULT_ACCOUNT"
          echo "CDK_DEFAULT_REGION = $CDK_DEFAULT_REGION"
          echo "AWS_PROFILE = $AWS_PROFILE"
          npx cdk list

    - name: CDK Deploy
      working-directory: solution/bakehouse-app
      run: npx cdk deploy ${BAKEHOUSE_STACK_NAME}-bakehouse-stack

    - name: Print deployed
      run: |
          echo "✅ Deployment complete!"
